<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mac Knowledge Base</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Personal Markdown Library</p>
        <h1>Mac Knowledge Base</h1>
      </div>
      <a class="repo-link" href="https://github.com/cuizihao1992/mac-knowledge-base">GitHub</a>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="知识库分类">
        <div class="search-wrap">
          <label for="search">搜索</label>
          <input id="search" type="search" placeholder="输入关键词、标签或路径" autocomplete="off" />
        </div>
        <nav id="sections" class="sections"></nav>
      </aside>

      <section class="content">
        <div class="stats" id="stats"></div>
        <div id="notes" class="notes"></div>
      </section>

      <article class="reader" id="reader" aria-live="polite">
        <div class="reader-empty">
          <h2>选择一篇内容</h2>
          <p>从左侧搜索或在列表中打开笔记。</p>
        </div>
      </article>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
